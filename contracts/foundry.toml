[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
hashkey_testnet = "${HASHKEY_TESTNET_RPC_URL}"
hashkey_mainnet = "https://mainnet.hsk.xyz"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
hashkey_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://testnet-explorer.hsk.xyz/api" }
hashkey_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://hashkey.blockscout.com/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
